<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/slcicon.png" />
  <link rel="apple-touch-icon" href="/slcicon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />

  <!-- iOS: abre en modo app (sin barra de Safari) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SLC Turnos" />

  <title>SLC Turnos</title>

  <!-- Splash screen inline: evita pantalla negra en iOS antes de que React cargue -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: linear-gradient(135deg, #0f172a 0%, #172554 100%);
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
    }
    #splash span {
      font-family: Arial, sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.01em;
    }
    #splash.hide {
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Splash visible antes de que React hidrate -->
  <div id="splash">
    <img src="/slcicon.png" alt="SLC Turnos" />
    <span>SLC Turnos</span>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
