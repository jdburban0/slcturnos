<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/slcicon.png" />
  <link rel="apple-touch-icon" href="/slcicon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />

  <!-- iOS: abre en modo app (sin barra de Safari) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SLC Turnos" />

  <title>SLC Turnos</title>

  <!-- iOS splash screens (apple-touch-startup-image) — one per device resolution -->
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/splashes/splash-750x1334.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/splashes/splash-828x1792.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1125x2436.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1170x2532.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1179x2556.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1242x2688.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1284x2778.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1290x2796.png" />
  <link rel="apple-touch-startup-image" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/splashes/splash-1320x2868.png" />

  <!-- Splash screen inline: evita pantalla negra en iOS antes de que React cargue -->
  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #2563eb;
    }
    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
    }
    #splash span {
      font-family: Arial, sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.01em;
    }
    #splash.hide {
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Splash visible antes de que React hidrate — se oculta inmediatamente en recargas -->
  <div id="splash">
    <img src="/slcicon.png" alt="SLC Turnos" />
    <span>SLC Turnos</span>
  </div>
  <script>
    // Solo mostrar el splash en cold start, no en recargas
    if (performance.getEntriesByType('navigation')[0]?.type === 'reload') {
      document.getElementById('splash').style.display = 'none';
    }
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
